name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    # TODO: Move uv/python setup to the seperate file and just import here
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up project
        run: uv sync --locked --dev

      - name: Run ruff check
        run: uv run ruff check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up project
        run: uv sync --locked --dev

      - name: Run unit tests
        run: uv run pytest -v
